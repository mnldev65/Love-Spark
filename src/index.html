<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
    <title>https://www.Login-Love-Spark.com</title>
</head>
<body>
    <main>
        <video 
            src="./assets/images-videos/petalas-caindo.mp4"
            class="background-video"
            autoplay
            muted
            loop
            playsinline>
        </video>
        <div class="container">
            <h1>Login</h1>
            <form action="">
                <label for="email" class="label-container">Email:</label>
                <input name="email" type="email" class="input-container" placeholder="Digite seu email">

                <label for="senha" class="label-container">Senha</label>
                <input name="senha" type="password" class="input-container" placeholder="Digite sua senha">
                <button class="btn-enter">Entra</button>
                <div class="links-container">
                    <a href="cadastro.html" class="cadastro">Cadastro</a>
                    <a href="esqueciSenha.html" class="forgot">Esqueci a senha</a>
                </div>
            </form>
        </div>
    </main>
</body>

<script src="./js/login.js"></script>
</html>
